# Description: Configuration file for the experiment. Should be fixed for all participants recruited in the same lab.
language: FA
full_language: Persian    # English name of the language, e.g., English, German, Spanish, etc.
country_code: CH
year: 2025      # estimated end year of the experiment, e.g., 2024.
lab_number: 1     # identifier of the lab as defined in the pre-registration form!
random_seed: 123    # Alternative: None. Random seed for reproducibility across runs and participants. Try to keep this fixed. If you want different random seeds for different participants, you can set this to None and the random seed will be randomly generated.
font: Segoe UI     # Default font used for the experiment, supporting most Latin and Cyrillic languages. Please choose a font that is suitable for the language and operating system you are running the experiment in. E.g., Microsft YaHei for Chinese etc.
wmc: True      # Alternative: False, if you want to run the experiment without the WMC task.
ran: True      # Alternative: False, if you want to run the experiment without the RAn tasks.
stroop_flanker: True      # Alternative: False, if you want to run the experiment without the Stroop and Flanker tasks.
plab: True       # Alternative: False, if you want to run the experiment without the PLAB tasks.
wiki_vocab: True      # Alternative: False, if you want to run the experiment without the WikiVocab tasks.